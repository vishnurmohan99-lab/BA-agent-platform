<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Agent Platform</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #c9c7be; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-wrap { width: 100%; max-width: 400px; padding: 24px; }
  .logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; letter-spacing: -0.5px; }
  .logo span { color: #5DCAA5; }
  .tagline { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 36px; }
  .card { background: #1a1d27; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 28px; }
  .card h2 { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .card p { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
  label { display: block; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: .04em; }
  input[type=email], input[type=password] {
    width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: #fff; font-size: 14px; outline: none; margin-bottom: 16px; transition: border .15s;
  }
  input:focus { border-color: #5DCAA5; }
  input::placeholder { color: rgba(255,255,255,0.2); }
  .btn-login {
    width: 100%; padding: 12px; background: #5DCAA5; border: none; border-radius: 8px;
    color: #04342C; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; margin-top: 4px;
  }
  .btn-login:hover { opacity: .88; }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; }
  .error { background: rgba(226,75,74,0.12); border: 1px solid rgba(226,75,74,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #F09595; margin-bottom: 16px; display: none; }
  .footer-note { font-size: 12px; color: rgba(255,255,255,0.25); text-align: center; margin-top: 20px; }
  .designed-by { font-size: 11px; color: rgba(255,255,255,0.18); text-align: center; margin-top: 10px; }
  @media (max-width:600px){.login-wrap{padding:16px}.card{padding:20px}}
</style>
<link rel="stylesheet" href="animations.css">
</head>
<body>
<div class="login-wrap">
  <div class="logo">Agent<span>Platform</span></div>
  <p class="tagline">AI-powered product intelligence for your entire team</p>

  <div class="card">
    <h2>Sign in</h2>
    <p>Enter your credentials to access the platform</p>

    <div class="error" id="error-msg"></div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

    <button class="btn-login" id="btn-login" onclick="signIn()">Sign in</button>
  </div>

  <p class="footer-note">Contact your admin if you don't have an account</p>
  <p class="designed-by">Designed by Vishnu R Mohan</p>
</div>

<script>
async function signIn() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');

  if (!email || !password) { showError('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  document.getElementById('error-msg').style.display = 'none';

  try {
    await DB.auth.signIn(email, password);
    window.location.href = '/index.html';
  } catch (err) {
    showError(err.message || 'Sign in failed. Check your credentials.');
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') signIn();
});

// Redirect if already logged in
DB.auth.getSession().then(session => {
  if (session) window.location.href = '/index.html';
});
</script>
</body>
</html>
